<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in HTML</title>
</head>
<body>
<h2>HTML Forms</h2>
<form action="index.html">
    <label>Name: </label>
    <input type="text" id="name" name="name" placeholder="Enter your name" maxlength="20">
<br><br>
    <label>Age: </label>
    <input type="number" id="age" name="age" placeholder="Enter your age" min="0">

    <br><br>
    <label for="email">Email: </label>
    <input type="email" id="email" name="email" placeholder="Enter your email">
<br><br>

<label for="password">Password: </label>
    <input type="password" id="password" name="password" placeholder="Enter your password">
<br><br>
    <label for="gender">Gender: </label>
    <input type="radio" id="male" name="gender" value="male">   
    <label for="male">Male</label>
    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label>
<br><br>
<label for="joining_date">Date of Joining: </label>
    <input type="date" id="joining_date" name="joining_date">
<br><br>
<label for="country">Country: </label>
    <select id="country" name="country">
        <option value="usa">USA</option>
        <option value="canada">India</option>
        <option value="uk">UK</option>
        <option value="australia">Australia</option>            
    </select>

    <br><br>
    <label for="color">Favorite Color: </label>
    <input type="color" id="color" name="color" value="#ff0000">

    <br><br>
    <label for="comments">Comments: </label>
    <textarea id="comments" name="comments" rows="4" cols="50" placeholder="Enter your comments here..."></textarea>
<br><br>
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
</form>
</body>
</html>
